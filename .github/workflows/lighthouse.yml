name: Lighthouse CI

on:
  pull_request:
    branches:
      - main

jobs:
  lighthouse:
    name: Lighthouse Mobile Perf Audit
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @multiplayer/shared build

      - name: Build web app
        run: pnpm --filter @multiplayer/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3002
          NEXT_PUBLIC_WS_URL: ws://localhost:3002
          NEXT_PUBLIC_GAME_SERVER_URL: http://localhost:3002

      - name: Start Next.js server
        run: pnpm --filter @multiplayer/web start &
        env:
          PORT: 3000

      - name: Wait for server to be ready
        run: |
          echo "Waiting for Next.js to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "Server did not start in 60s" && exit 1

      - name: Install LHCI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}
          LHCI_BUILD_CONTEXT__COMMIT_MESSAGE: ${{ github.event.pull_request.title }}
          LHCI_BUILD_CONTEXT__AUTHOR_NAME: ${{ github.actor }}

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports-${{ github.run_id }}
          path: .lighthouseci/
          retention-days: 30
